# Prefer compressed swap before the desktop is killed under pressure.
vm.swappiness = 100
vm.page-cluster = 0
vm.vfs_cache_pressure = 100

# Keep dirty bursts small on slow raw NAND and avoid long writeback stalls.
vm.dirty_background_ratio = 5
vm.dirty_ratio = 15
vm.dirty_expire_centisecs = 3000
vm.dirty_writeback_centisecs = 1500

# Small hardening setting with no meaningful RAM cost.
kernel.dmesg_restrict = 1
